<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benjamim Portfolio</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="sidebar">

    <div class="logo">
        <div class="logo-icon"></div>

        <div>
            <h3>BENJAMIM</h3>
            <span>PORTFOLIO</span>
        </div>
    </div>

    <div class="menu">
<div class="toolbar">

    <input
    type="text"
    id="search"
    placeholder="Pesquisar projeto...">

    <div class="filters">

        <button data-filter="all">Todos</button>
        <button data-filter="games">🎮 Games</button>
        <button data-filter="web">🌐 Web</button>
        <button data-filter="js">🟨 JS</button>
        <button data-filter="python">🐍 Python</button>

    </div>

</div>

<div id="cards"></div>
        <button class="active">
            🌾 Eco Valley
        </button>

        <button>
            🏥 Radar Saúde
        </button>

        <button>
            🌱 Greenvale
        </button>

    </div>

    <div class="status">

        <h4>SISTEMA</h4>

        <div class="bar">
            <div class="fill"></div>
        </div>

        <p>ONLINE</p>

    </div>

</div>

<main>

    <div class="bg-text">
        BP
    </div>

    <div class="top">

        <span class="path">
            / HOME / PORTFOLIO
        </span>

        <h1>
            BENJAMIM
        </h1>

        <h2>
            PORTFOLIO
        </h2>

        <p>
            Projetos, jogos e experiências criadas com HTML, CSS e JavaScript.
        </p>

    </div>

    <div class="stats">

        <div class="card">
            <span>TOTAL DE PROJETOS</span>
            <h3>3</h3>
        </div>

        <div class="card">
            <span>TECNOLOGIAS</span>
            <h3>HTML CSS JS</h3>
        </div>

    </div>

    <div id="cards" class="projects"></div>

</main>

<script src="Data/projetos.js"></script>
<script src="script.js"></script>

</body>
</html>
