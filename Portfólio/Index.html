<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benjamim Portfolio</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="sidebar" id="sidebar">

    <div>

        <div class="logo">
            <div class="logo-circle"></div>

            <div class="logo-text">
                <h2>BENJAMIM</h2>
                <span>PORTFOLIO</span>
            </div>
        </div>

        <button id="toggleBtn">☰</button>

        <nav>

            <button class="filter active" data-filter="all">
                ✨ Todos
            </button>

            <button class="filter" data-filter="games">
                🎮 Games
            </button>

            <button class="filter" data-filter="js">
                🟨 JavaScript
            </button>

            <button class="filter" data-filter="python">
                🐍 Python
            </button>

            <button class="filter" data-filter="web">
                🌐 Web
            </button>

        </nav>

    </div>

    <div class="stats">

        <div class="stat">
            <span>Projetos</span>
            <h3 id="totalProjetos">0</h3>
        </div>

        <div class="stat">
            <span>Categorias</span>
            <h3>4</h3>
        </div>

    </div>

</div>

<main>

    <section class="hero">

        <div class="bg-title">
            BP
        </div>

        <h1>BENJAMIM</h1>

        <h2>PORTFOLIO</h2>

        <p>
            Projetos, jogos e experiências digitais.
        </p>

    </section>

    <section class="search-area">

        <input
        id="search"
        type="text"
        placeholder="Pesquisar projeto...">

    </section>

    <section id="featured">
    </section>

    <section>

        <div class="section-title">

            <h3>PROJETOS</h3>

        </div>

        <div id="cards" class="cards"></div>

    </section>

</main>

<script src="Data/projetos.js"></script>
<script src="script.js"></script>

</body>
</html>
